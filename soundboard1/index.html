<!doctype html>
<html>
  <link rel="stylesheet" href="style.css">

<div class="sb-wrap">
  <div class="sb-header">
    <i class="ti ti-music" style="font-size:22px; color:var(--color-text-secondary)"></i>
    <h2>Soundboard</h2>
  </div>

  <div class="add-panel">
    <div class="row">
      <div>
        <label for="yt-url">YouTube URL</label>
        <input type="text" id="yt-url" placeholder="https://youtube.com/watch?v=..." />
      </div>
      <div>
        <label for="yt-start">Start (s)</label>
        <input type="number" id="yt-start" placeholder="e.g. 62" min="0" step="1" />
      </div>
      <div>
        <label for="yt-dur">Duration (s)</label>
        <input type="number" id="yt-dur" placeholder="e.g. 15" min="3" max="120" step="1" value="14" />
      </div>
      <div>
        <label style="visibility:hidden">Add</label>
        <button class="add-btn" onclick="addClip()"><i class="ti ti-plus"></i> Add clip</button>
      </div>
    </div>
    <div style="margin-top:8px;display:flex;gap:12px">
      
      <div style="flex:1">
        <label for="yt-label">Player (optional)</label>
        <input type="text" id="yt-label" placeholder="e.g. Drop, Chorus, Intro..." style="width:100%;box-sizing:border-box;" />
      </div>
      <div style="flex:1">
        <label for="yt-song">Song Title (optional)</label>
        <input type="text" id="yt-song" placeholder="e.g. Song name..." style="width:100%;box-sizing:border-box;" />
      </div>
    </div>
    <div class="error-msg" id="err-msg"></div>
  </div>

  <div class="player-area" id="player-area">
    <div class="now-playing">
      <span style="display:flex;align-items:center;gap:6px"><i class="ti ti-player-play"></i> <span id="np-text">Playing...</span></span>
      <span class="fade-badge" id="fade-badge">Fade in</span>
    </div>
    <div id="yt-player"></div>
    <div class="vol-bar-wrap">
      <div class="vol-bar-track"><div class="vol-bar-fill" id="vol-bar"></div></div>
    </div>
  </div>

  <div class="board" id="board">
    <div class="empty-state">
      <i class="ti ti-music-off" style="font-size:28px;display:block;margin-bottom:8px"></i>
      No clips yet — add one above
    </div>
  </div>

  <div class="modal" id="edit-modal">
    <div class="modal-content">
      <div class="modal-header">
        <h3>Edit Clip</h3>
        <button class="close-btn" onclick="closeEditModal()"><i class="ti ti-x"></i></button>
      </div>
      <div class="modal-body">
        <div>
          <label for="edit-label">Player</label>
          <input type="text" id="edit-label" placeholder="e.g. Drop, Chorus, Intro..." />
        </div>
        <div>
          <label for="edit-song">Song Title</label>
          <input type="text" id="edit-song" placeholder="e.g. Song name..." />
        </div>
        
        <div style="display:flex;gap:16px">
          <div style="flex:1">
            <label for="edit-start">Start (s)</label>
            <input type="number" id="edit-start" min="0" step="1" />
          </div>
          <div style="flex:1">
            <label for="edit-dur">Duration (s)</label>
            <input type="number" id="edit-dur" min="5" max="120" step="1" />
          </div>
        </div>
      </div>
      <div class="modal-footer">
        <button class="cancel-btn" onclick="closeEditModal()">Cancel</button>
        <button class="save-btn" onclick="saveEditClip()">Save</button>
      </div>
    </div>
  </div>

  <div class="export" id="export">
    <button onclick="exportSoundboard()">Export</button>

      <input
        type="file"
        accept=".json"
        onchange="importSoundboard(event)"
>

</div>

<script src="https://www.youtube.com/iframe_api"></script>
<script>

const STORAGE_KEY = 'youtube_soundboard_clips';

function saveSoundboard() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(clips));
}

function loadSoundboard() {
  const saved = localStorage.getItem(STORAGE_KEY);

  if (!saved) return;

  try {
    clips = JSON.parse(saved);

    // Ensure IDs exist if loading older data
    clips = clips.map(c => ({
      ...c,
      id: c.id || Date.now() + Math.random()
    }));

    renderBoard();
  } catch (err) {
    console.error('Failed to load soundboard:', err);
  }
}

  const FADE_DURATION = 1500; // ms for fade in / fade out
  const FADE_STEP = 50;       // ms between volume ticks

  let clips = [];
  let player = null;
  let playerReady = false;
  let currentClipId = null;
  let fadeInterval = null;
  let stopTimer = null;
  let pendingClip = null;
  let editingClipId = null;

  function onYouTubeIframeAPIReady() {
    player = new YT.Player('yt-player', {
      height: '80', width: '100%',
      playerVars: { controls: 1, rel: 0, modestbranding: 1 },
      events: {
        onReady: () => { playerReady = true; if (pendingClip) { playClip(pendingClip); pendingClip = null; } },
        onStateChange: (e) => {
          // If video ends naturally before our timer, clean up
          if (e.data === YT.PlayerState.ENDED) stopPlayback(false);
        }
      }
    });
  }

  function parseVideoId(url) {
    try {
      const u = new URL(url.trim());
      if (u.hostname.includes('youtu.be')) return u.pathname.slice(1).split('?')[0];
      return u.searchParams.get('v');
    } catch { return null; }
  }

  function toHMS(s) {
    s = parseInt(s) || 0;
    const h = Math.floor(s/3600), m = Math.floor((s%3600)/60), sec = s%60;
    return h > 0 ? `${h}:${String(m).padStart(2,'0')}:${String(sec).padStart(2,'0')}` : `${m}:${String(sec).padStart(2,'0')}`;
  }

  function setVolBar(vol) {
    document.getElementById('vol-bar').style.width = vol + '%';
  }

  function clearTimers() {
    if (fadeInterval) { clearInterval(fadeInterval); fadeInterval = null; }
    if (stopTimer) { clearTimeout(stopTimer); stopTimer = null; }
  }

  function fadeIn(onDone) {
    setBadge('Fading in', false);
    player.setVolume(0);
    let vol = 0;
    const steps = FADE_DURATION / FADE_STEP;
    const increment = 100 / steps;
    fadeInterval = setInterval(() => {
      vol = Math.min(100, vol + increment);
      player.setVolume(vol);
      setVolBar(vol);
      if (vol >= 100) {
        clearInterval(fadeInterval); fadeInterval = null;
        setBadge('Playing', false);
        if (onDone) onDone();
      }
    }, FADE_STEP);
  }

  function fadeOut(onDone) {
    setBadge('Fading out', true);
    let vol = 100;
    const steps = FADE_DURATION / FADE_STEP;
    const decrement = 100 / steps;
    fadeInterval = setInterval(() => {
      vol = Math.max(0, vol - decrement);
      player.setVolume(vol);
      setVolBar(vol);
      if (vol <= 0) {
        clearInterval(fadeInterval); fadeInterval = null;
        if (onDone) onDone();
      }
    }, FADE_STEP);
  }

  function setBadge(text, isOut) {
    const badge = document.getElementById('fade-badge');
    badge.textContent = text;
    badge.className = 'fade-badge' + (isOut ? ' fading-out' : '');
  }

  function playClip(id) {
    if (!playerReady) { pendingClip = id; return; }
    const clip = clips.find(c => c.id === id);
    if (!clip) return;

    clearTimers();

    if (currentClipId === id) {
      stopPlayback(true);
      return;
    }

    // Stop previous cleanly
    if (currentClipId !== null) {
      player.stopVideo();
    }

    currentClipId = id;
    document.getElementById('np-text').textContent = clip.label;
    document.getElementById('player-area').classList.add('visible');
    renderBoard();

    player.setVolume(0);
    player.loadVideoById({ videoId: clip.vid, startSeconds: clip.start });
    player.playVideo();

    // Wait briefly for playback to start, then fade in
    setTimeout(() => {
      fadeIn(() => {
        // After fade in, schedule fade out before clip ends
        const sustainMs = Math.max(0, (clip.dur * 1000) - (FADE_DURATION * 2));
        stopTimer = setTimeout(() => {
          fadeOut(() => {
            player.stopVideo();
            stopPlayback(false);
          });
        }, sustainMs);
      });
    }, 400);
  }

  function stopPlayback(withFade) {
    clearTimers();
    if (withFade && player && playerReady && currentClipId !== null) {
      fadeOut(() => {
        player.stopVideo();
        finalizeStop();
      });
    } else {
      if (player && playerReady) player.stopVideo();
      finalizeStop();
    }
  }

  function finalizeStop() {
    currentClipId = null;
    setVolBar(0);
    document.getElementById('player-area').classList.remove('visible');
    renderBoard();
  }

  function addClip() {
    const url = document.getElementById('yt-url').value.trim();
    const start = parseInt(document.getElementById('yt-start').value) || 0;
    const dur = parseInt(document.getElementById('yt-dur').value) || 14;
    const label = document.getElementById('yt-label').value.trim();
    const song = document.getElementById('yt-song').value.trim();
    const err = document.getElementById('err-msg');

    err.textContent = '';
    if (!url) { err.textContent = 'Please enter a YouTube URL.'; return; }
    const vid = parseVideoId(url);
    if (!vid) { err.textContent = 'Could not parse a video ID from that URL.'; return; }
    if (dur < 5) { err.textContent = 'Duration should be at least 5s to allow fades.'; return; }

clips.push({
  id: Date.now(),
  vid,
  start,
  dur,
  label: label || `Clip ${clips.length + 1}`,
  song: song || ''
});

saveSoundboard();
    document.getElementById('yt-url').value = '';
    document.getElementById('yt-start').value = '';
    document.getElementById('yt-dur').value = '14';
    document.getElementById('yt-label').value = '';
    document.getElementById('yt-song').value = '';
    renderBoard();
  }


  function deleteClip(id) {
    if (currentClipId === id) stopPlayback(false);
clips = clips.filter(c => c.id !== id);
saveSoundboard();
renderBoard();
  }

  document.addEventListener('DOMContentLoaded', () => {
  loadSoundboard();
});

  function renderBoard() {
    const board = document.getElementById('board');
    if (!clips.length) {
      board.innerHTML = '<div class="empty-state"><i class="ti ti-music-off" style="font-size:28px;display:block;margin-bottom:8px"></i>No clips yet — add one above</div>';
      return;
    }
    board.innerHTML = clips.map(c => `
      <div class="clip-card${currentClipId === c.id ? ' playing' : ''}" draggable="true" data-id="${c.id}">        ${c.song ? `<div class=\"clip-song\" title=\"${c.song}\">${c.song}</div>` : ''}        <div class="clip-title" title="${c.label}">${c.label}</div>
        <div class="clip-meta"><i class="ti ti-clock" style="font-size:11px"></i> ${toHMS(c.start)} &middot; ${c.dur}s</div>
        <div class="clip-actions">
          <button class="play-btn${currentClipId === c.id ? ' active' : ''}" onclick="playClip(${c.id})">
            <i class="ti ${currentClipId === c.id ? 'ti-player-stop' : 'ti-player-play'}"></i>
            ${currentClipId === c.id ? 'Stop' : 'Play'}
          </button>
          <button class="edit-btn" onclick="openEditModal(${c.id})"><i class="ti ti-edit"></i>edit</button>
          <button class="del-btn" onclick="deleteClip(${c.id})"><i class="ti ti-trash">delete</i></button>
        </div>
      </div>
    `).join('');
    
    attachDragListeners();
  }

  let draggedCard = null;

  function attachDragListeners() {
    const cards = document.querySelectorAll('.clip-card');
    cards.forEach(card => {
      card.addEventListener('dragstart', handleDragStart);
      card.addEventListener('dragover', handleDragOver);
      card.addEventListener('drop', handleDrop);
      card.addEventListener('dragend', handleDragEnd);
      card.addEventListener('dragenter', handleDragEnter);
      card.addEventListener('dragleave', handleDragLeave);
    });
  }

  function handleDragStart(e) {
    draggedCard = this;
    this.classList.add('dragging');
    e.dataTransfer.effectAllowed = 'move';
  }

  function handleDragOver(e) {
    e.preventDefault();
    e.dataTransfer.dropEffect = 'move';
  }

  function handleDragEnter(e) {
    if (this !== draggedCard) {
      this.classList.add('drag-over');
    }
  }

  function handleDragLeave(e) {
    this.classList.remove('drag-over');
  }

  function handleDrop(e) {
    e.preventDefault();
    if (this !== draggedCard) {
      const draggedId = parseInt(draggedCard.dataset.id);
      const targetId = parseInt(this.dataset.id);
      
      const draggedIndex = clips.findIndex(c => c.id === draggedId);
      const targetIndex = clips.findIndex(c => c.id === targetId);
      
      if (draggedIndex !== -1 && targetIndex !== -1) {
        const [movedClip] = clips.splice(draggedIndex, 1);
        clips.splice(targetIndex, 0, movedClip);
        saveSoundboard();
        renderBoard();
      }
    }
    this.classList.remove('drag-over');
  }

  function handleDragEnd(e) {
    this.classList.remove('dragging');
    document.querySelectorAll('.clip-card').forEach(card => {
      card.classList.remove('drag-over');
    });
  }

  document.getElementById('yt-url').addEventListener('keydown', e => { if (e.key === 'Enter') addClip(); });

  function openEditModal(id) {
    const clip = clips.find(c => c.id === id);
    if (!clip) return;
    
    editingClipId = id;
    document.getElementById('edit-song').value = clip.song || '';
    document.getElementById('edit-label').value = clip.label;
    document.getElementById('edit-start').value = clip.start;
    document.getElementById('edit-dur').value = clip.dur;
    document.getElementById('edit-modal').classList.add('open');
  }

  function closeEditModal() {
    document.getElementById('edit-modal').classList.remove('open');
    editingClipId = null;
  }

  function saveEditClip() {
    if (!editingClipId) return;
    
    const clip = clips.find(c => c.id === editingClipId);
    if (!clip) return;
    
    const song = document.getElementById('edit-song').value.trim();
    const label = document.getElementById('edit-label').value.trim();
    const start = parseInt(document.getElementById('edit-start').value) || 0;
    const dur = parseInt(document.getElementById('edit-dur').value) || 14;
    
    if (dur < 5) {
      alert('Duration should be at least 5s to allow fades.');
      return;
    }
    
    clip.song = song || '';
    clip.label = label || 'Untitled Clip';
    clip.start = start;
    clip.dur = dur;
    
    saveSoundboard();
    closeEditModal();
    renderBoard();
  }

  document.addEventListener('keydown', e => {
    if (e.key === 'Escape') closeEditModal();
  });
function exportSoundboard() {
  const blob = new Blob(
    [JSON.stringify(clips, null, 2)],
    { type: 'application/json' }
  );

  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'soundboard.json';
  a.click();

  URL.revokeObjectURL(a.href);
}

function importSoundboard(event) {
  const file = event.target.files[0];
  if (!file) return;

  const reader = new FileReader();

  reader.onload = e => {
    try {
      clips = JSON.parse(e.target.result);
      saveSoundboard();
      renderBoard();
    } catch {
      alert('Invalid soundboard file.');
    }
  };

  reader.readAsText(file);
}

</script>
</html>
